version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/src'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    groups:
      npm-deps:
        patterns:
          - '*'
    ignore:
      # Tailwind majors held on v3 deliberately - see CLAUDE.md / memory
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']
      - dependency-name: '@astrojs/tailwind'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    labels:
      - 'ci'
    groups:
      actions-deps:
        patterns:
          - '*'
